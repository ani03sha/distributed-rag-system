name: distributed-rag-infra

services:
    qdrant:
        image: qdrant/qdrant:v1.13.6
        container_name: rag-qdrant
        ports:
            - "6333:6333" # REST API
            - "6334:6334" # gRPC
        volumes:
            - qdrant_data:/qdrant/storage
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
            interval: 10s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7.2-alpine
        container_name: rag-redis
        ports:
            - "6389:6379"
        command: redis-server --appendonly yes
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5

    postgres:
        image: postgres:16-alpine
        container_name: rag-postgres
        ports:
            - "5632:5432"
        environment:
            POSTGRES_DB: rag
            POSTGRES_USER: rag
            POSTGRES_PASSWORD: rag_dev_password
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U rag -d rag"]
            interval: 10s
            timeout: 5s
            retries: 5

    redpanda:
        image: redpandadata/redpanda:v24.1.1
        container_name: rag-redpanda
        command:
            - redpanda
            - start
            - --smp 1
            - --memory 512M
            - --overprovisioned
            - --node-id 0
            # Two listeners: INTERNAL for Docker services, EXTERNAL for host machine
            - --kafka-addr INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
            - --advertise-kafka-addr INTERNAL://redpanda:29092,EXTERNAL://localhost:9092
            - --pandaproxy-addr 0.0.0.0:8082
            - --advertise-pandaproxy-addr localhost:8082
        ports:
            - "9092:9092" # Kafka API — host machine connects here
            - "8082:8082" # Pandaproxy (HTTP Kafka)
            - "9644:9644" # Admin API
        volumes:
            - redpanda_data:/var/lib/redpanda/data
        healthcheck:
            test: ["CMD", "rpk", "cluster", "health"]
            interval: 15s
            timeout: 10s
            retries: 5

    redpanda-console:
        image: redpandadata/console:v2.5.2
        container_name: rag-redpanda-console
        depends_on:
            redpanda:
                condition: service_healthy
        ports:
            - "8080:8080"
        environment:
            KAFKA_BROKERS: "redpanda:29092" # uses INTERNAL listener

    ollama:
        image: ollama/ollama:latest
        container_name: rag-ollama
        ports:
            - "11434:11434"
        volumes:
            - ${HOME}/.ollama:/root/.ollama # bind-mount: shares models with native Ollama install

        # Only enable if you have GPU
    #        deploy:
    #            resources:
    #                reservations:
    #                    devices:
    #                        -   driver: nvidia
    #                            count: all
    #                            capabilities:
    #                                - gpu

    prometheus:
        image: prom/prometheus:v2.52.0
        container_name: rag-prometheus
        ports:
            - "9090:9090"
        volumes:
            - ./prometheus.yml:/etc/prometheus/prometheus.yml
        command:
            - --config.file=/etc/prometheus/prometheus.yml
        healthcheck:
            test:
                [
                    "CMD",
                    "wget",
                    "--quiet",
                    "--tries=1",
                    "--spider",
                    "http://localhost:9090/-/healthy",
                ]
            interval: 15s
            timeout: 5s
            retries: 5

    jaeger:
        image: jaegertracing/all-in-one:1.57
        container_name: rag-jaeger
        ports:
            - "16686:16686"
            - "4317:4317"
        environment:
            COLLECTOR_OTLP_ENABLED: "true"

volumes:
    qdrant_data:
    redis_data:
    postgres_data:
    redpanda_data:
    prometheus_data:

# Why all services share one network named rag-network: When application services are added in docker-compose.dev.yml,
# they can reach qdrant, redis, postgres by hostname. No IP addresses, no hardcoding.
networks:
    default:
        name: rag-network
