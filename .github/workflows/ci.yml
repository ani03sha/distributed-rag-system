name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dev dependencies
        run: uv sync --only-dev

      - name: Ruff lint
        run: uv run ruff check services/ shared/

      - name: Ruff format check
        run: uv run ruff format --check services/ shared/

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install all workspace dependencies
        run: uv sync --all-packages

      - name: Run tests
        run: uv run pytest services/query/tests services/worker/tests -v --tb=short
